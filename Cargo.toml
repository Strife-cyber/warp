[package]
name = "warp"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
bincode = "1.3.3"
tokio-util = "0.7.18"
futures-util = "0.3.32"
tokio = { version = "1.50.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
reqwest = { version = "0.13.2", features = ["json", "stream", "blocking", "gzip", "brotli", "cookies", "rustls"] }
