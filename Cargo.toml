[package]
name = "warp"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
bincode = "1.3.3"
sysinfo = "0.38.4"
tempfile = "3.27.0"
tokio-util = "0.7.18"
serde_json = "1.0.149"
directories = "5.0.1"
futures-util = "0.3.32"
clap = { version = "4.5.21", features = ["derive"] }
tokio = { version = "1.50.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
reqwest = { version = "0.13.2", features = ["json", "stream", "blocking", "gzip", "brotli", "cookies", "rustls"] }

[dev-dependencies]
tempfile = "3.27.0"

